<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackaton05</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <style>
    * {
      font-family: "Syne", sans-serif;
    }

    code {
      font-family: "JetBrains Mono", monospace;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .step-panel {
      animation: fadeSlide 0.35s ease;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 9px;
    }
  </style>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <header class="border-b border-zinc-800 px-6 py-4 flex items-center gap-3">
      <span class="text-2xl">📠</span>
      <div>
        <h1 class="text-xl font-extrabold tracking-tight leading-none">
          Hackaton 05
        </h1>
        <p class="text-zinc-500 text-sm">ES6 clases y objetos</p>
      </div>
    </header>

    <div class="flex h-[calc(100vh-65px)]">
      <aside class="w-64 border-r border-zinc-800 p-5 flex flex-col shrink-0">
        <p
          class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-3"
        >
          Flujo de reparaciones
        </p>

        <!-- paso a paso -->
        <div id="stepper" class="flex flex-col gap-3"></div>

        <div
          id="telActivo"
          class="mt-auto bg-zinc-900 border border-zinc-800 rounded-xl p-3"
        >
          <p class="text-xs text-zinc-500 mb-1">Equipo en flujo</p>
          <p class="text-sm font-bolc text-white leading-tight">En repacion</p>

          <p class="telActivoSerie" class="text-xs text-zinc-400">entregado</p>
          <span
            id="telActivoEstado"
            class="inline-block mt-1 px-2 py-0.5 rounded-full border font-bold"
          ></span>
        </div>
      </aside>

      <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-8">
          <div id="stepContent"></div>
        </div>
      </main>
    </div>

    <!-- TEMPLATES -->

    <template id="tpl-0">
      <div class="max-w-lg mx-auto pt-8 step-panel">
        <div class="text-6xl mb-4">📠</div>
        <h2 class="text-3xl font-extrabold mb-2">Bienvenido al sistema</h2>
        <p class="text-zinc-400 mb-8 leading-relaxed">
          El paso a paso para la reapacion de un celular:
        </p>

        <div class="grid grid-cols-3 gap-3 mb-8 text-left">
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <div class="text-2xl mb-1">1 📱</div>
            <p class="text-xs text-zinc-500">Registrar Equipo</p>
            <p class="text-xs text-zinc-400">Validar serie e IMEI</p>
          </div>

          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <div class="text-2xl mb-1">2</div>
            <p class="text-xs text-zinc-500">Diagnostico</p>
            <p class="text-xs text-zinc-400">Primera revision</p>
          </div>

          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <div class="text-2xl mb-1">3</div>
            <p class="text-xs text-zinc-500">Autorizacion</p>
            <p class="text-xs text-zinc-400">Firma + abono</p>
          </div>

          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <div class="text-2xl mb-1">4</div>
            <p class="text-xs text-zinc-500">Asignar Tecnico</p>
            <p class="text-xs text-zinc-400">Asignar y validar skill</p>
          </div>

          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <div class="text-2xl mb-1">5</div>
            <p class="text-xs text-zinc-500">Repuesto</p>
            <p class="text-xs text-zinc-400">Piezas</p>
          </div>

          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <div class="text-2xl mb-1">6</div>
            <p class="text-xs text-zinc-500">Estado Final</p>
            <p class="text-xs text-zinc-400">Resumen completo</p>
          </div>
        </div>

        <button
          onclick="goStep(1)"
          class="bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold px-8 py-3 rounded-xl transition text-sm"
        >
          Comenzar
        </button>
      </div>
    </template>

    <template id="tpl-1">
      <div class="max-w-md mx-auto step-panel">
        <div class="flex items-center gap-3 mb-6">
          <span
            class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm shrink-0"
            >1</span
          >
          <div>
            <h2 class="text-xl font-extrabold">Registrar Telefono</h2>
            <p class="text-zinc-500 text-xs">
              Valida que el IMEI y numero de serie no esten reportados
            </p>
          </div>
        </div>

        <div
          class="bg-red-950/40 border border-red-800/30 rounded-xl p-3 mb-5 text-xs text-red-400"
        >
          <strong>Lista negra:</strong> Serie: <code>123123123</code> IMEI:
          <code>ASDJKHASDKJ</code>
        </div>
      </div>

      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-zinc-400 mb-1 block"
              >Numero de Serie:</label
            >
            <input
              id="s1_serie"
              type="text"
              placeholder="Ej: SN12312312"
              class="w-full bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600 transition"
            />
          </div>

          <div>
            <label class="text-xs text-zinc-400 mb-1 block">IMEI:</label>
            <input
              id="s1_imei"
              type="text"
              placeholder="Ej: IMEI12312312"
              class="w-full bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600 transition"
            />
          </div>

          <div>
            <label class="text-xs text-zinc-400 mb-1 block">Marca:</label>
            <input
              id="s1_marca"
              type="text"
              placeholder="Ej: Marca"
              class="w-full bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600 transition"
            />
          </div>

          <div>
            <label class="text-xs text-zinc-400 mb-1 block">Modelo:</label>
            <input
              type="text"
              id="s1_modelo"
              placeholder="Ej: Modelo"
              class="w-full bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600 transition"
            />
          </div>

          <div>
            <label class="text-xs text-zinc-400 mb-1 block">Propietario:</label>
            <input
              id="s1_prop"
              type="text"
              placeholder="Ej: Juan Perez"
              class="w-full bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600 transition"
            />
          </div>
        </div>

        <div class="flex justify-end mt-5">
          <button
            onclick="step1Action()"
            class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl text-sm transition"
          >
            Registrar y Continuar
          </button>
        </div>
      </div>
    </template>
  </body>

  <script>
    // ========================================
    // CLASES TELEFONO
    // ========================================
    class Telefono {
      constructor(serie, imei, marca, modelo, propietario) {
        this.serie = serie;
        this.imei = imei;
        this.marca = marca;
        this.modelo = modelo;
        this.propietario = propietario;
        this.diagnostico = null;
        this.autorizado = false;
        this.abono = 0;
        this.tecnico = null;
        this.repuestos = [];
        this.estado = "INGRESADO";
      }

      resumen() {
        return `${this.marca} ${this.modelo} . ${this.propietario}`;
      }
    }

    // ========================================
    // CLASS DIAGNOSTICO
    // ========================================
    class Diagnostico {
      constructor(descripcion, costoEstimado) {
        this.descripcion = descripcion;
        this.costoEstimado = Number(costoEstimado);
        this.fecha = Date().tolocaleDateString("es-PE");
      }
    }

    // ========================================
    // Tecnico
    // ========================================
    class Tecnico {
      constructor(nombre, skill = []) {
        this.nombre = nombre;
        this.skill = skill;
      }

      puedeAtender(marca) {
        return this.skills
          .map((item) => item.toLowerCase())
          .includes(marca.toLowerCase());
      }
    }

    // ========================================
    // Repuestos
    // ========================================
    class Repuesto {
      constructor(nombre, precio) {
        this.nombre = nombre;
        this.precio = Number(precio);
      }
    }

    // ========================================
    // Sitema Principal
    // ========================================
    class SistemaReparacion {
      constructor() {
        this.telefonos = new Map();
        this.bloqueados = {
          series: new Set(["12321321"]),
          imeis: new Set(["IMEI123123"]),
        };

        this.tecnicos = [
          new Tecnico("Carlos Perez", ["samsung", "huawei"]),
          new Tecnico("Marta Perez", ["huawei"]),
          new Tecnico("juan Perez", ["apple"]),
        ];
      }

      registrarTelefono(serie, imei, marca, modelo, propietario) {
        const tel = new Telefono(serie, imei, marca, modelo, propietario);
        this.telefonos.set(serie, tel);

        console.log(tel);

        return tel;
      }
    }

    // ========================================
    // ESTADO GLOBAL
    // ========================================

    const sistema = new SistemaReparacion();
    let currentStep = 0;
    let currentSerie = null;

    const STEPS = [
      { label: "incio", icon: "🏠" },
      { label: "registrar", icon: "🏠" },
      { label: "diagnostico", icon: "🏠" },
      { label: "autorizacion", icon: "🏠" },
      { label: "tecnico", icon: "🏠" },
      { label: "repuestos", icon: "🏠" },
      { label: "estado final", icon: "🏠" },
    ];

    // ========================================
    // FUNCIONES
    // ========================================
    function v(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function goStep(n) {
      const tpl = document.getElementById(`tpl-${n}`);
      console.log(tpl);
      const content = document.getElementById("stepContent");
      content.innerHTML = "";
      if (!tpl) return;
      content.appendChild(tpl.content.cloneNode(true));
    }

    function step1Action() {
      try {
        const tel = sistema.registrarTelefono(
          v("s1_serie"),
          v("s1_imei"),
          v("s1_marca"),
          v("s1_modelo"),
          v("s1_prop"),
        );
        currentSerie = tel.serie;

        // goStep(2);
      } catch (e) {
        // console.log(e);
      }
    }

    goStep(1);
  </script>
</html>
